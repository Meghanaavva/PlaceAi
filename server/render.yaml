services:
  - type: web
    name: placeai-backend
    env: python 
    pythonVersion: "3.11.9"gid 
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: placeai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: placeai-db
    databaseName: placement_db
    user: placeai
    plan: free